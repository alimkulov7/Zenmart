<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenmart</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./public/css/command.css">
    <link rel="stylesheet" href="./public/css/home.css">
   
</head>
<body>
    <div class="navbar-frame">
        <div class="container">
            <div class="navbar-top">
                <a href="">
                    <img src=".//public/css/images/zenmart logo.png" alt="">
                </a>
                <div class="nav-search-frame">
                    <div class="search-box">
                        <div class="category-list">
                            <select >
                                <option value=""selected>All Categories</option>
                                <option value="Computer"> Computer</option>
                            </select>
                        </div>
                        <input type="search" placeholder="Search Products...">
                    </div>
                    <div class="search-icon-box">
                        <img src="./public/css/images/search 1.svg" alt="">
                    </div>
                </div>
                <div class="nav-top-menu">
                    <a href="">
                        <div class="top-menu-box">
                            <div class="box-icon-box">
                                <img src="./public/css/images/Vector.svg" alt="">
                            </div>
                            <div class="box-info-box">
                                <span>Wishlist</span>
                                <strong>My Items</strong>
                            </div>
                        </div>
                    </a>
                    <a href="">
                        <div class="top-menu-box">
                            <div class="box-icon-box">
                                <img src="./public/css/images/profile 1.svg" alt="">
                            </div>
                            <div class="box-info-box">
                                <span>Sign In</span>
                                <strong>Account</strong>
                            </div>
                        </div>
                    </a>
                    <a href="">
                        <div class="top-menu-box">
                            <div class="box-icon-box">
                                <img src="./public/css/images/shopping-cart 1.svg" alt="">
                            </div>
                            <div class="box-info-box">
                                <span>$200</span>
                                <strong>Total</strong>
                            </div>
                        </div>
                    </a>
                </div>
            </div>
            <div class="navbar-bott">
                <div class="navbar-bott-menu-box">
                    <div class="browse-box">
                        <img src="./public/css/images/browse.svg" alt="">
                        <span>Browse Categories</span>
                        
                    </div>

                    <div class="navbar-route-menu">
                        <a href="" class="title">Home</a>
                        <a href="">Shop</a>
                        <a href="">Orders</a>
                        <a href="">About</a>
                        <a href="">Contact</a>
                    </div>
                    <div class="sorting-menu">
                        <span>Deals of the Day</span>
                        <span> Hot Deals</span>
                        <span>Best Sellers</span>
                        <span>New Arrivals</span>
                    </div>
                </div>
            </div>
        </div>

    </div>
</body>
</html>
